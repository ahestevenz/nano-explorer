name: Lint

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  flake8:
    name: flake8
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.6
        uses: actions/setup-python@v4
        with:
          python-version: "3.6"

      - name: Install flake8
        run: |
          pip install flake8==3.9.2 flake8-bugbear==21.9.2

      - name: Run flake8
        run: |
          flake8 lib/ commands/ bin/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503,B950 \
            --exclude=__pycache__,.git

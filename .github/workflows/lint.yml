name: Lint
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  flake8:
    name: flake8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install flake8
        run: pip install flake8 flake8-bugbear

      - name: Run flake8
        run: |
          flake8 lib/ commands/ bin/ \
            --max-line-length=100 \
            --extend-ignore=E203,B950 \
            --exclude=__pycache__,.git

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show extra test summary info for failures and warnings
addopts =
    -v
    --tb=short
    --strict-markers

markers =
    hardware: marks tests that require real Jetson hardware (deselect with -m "not hardware")
    slow: marks tests that take a long time (e.g. TRT engine builds)

# Treat all warnings as errors except known third-party ones
filterwarnings =
    error
    ignore::DeprecationWarning:torchvision
    ignore::UserWarning:torch
    ignore::UserWarning:torchvision
